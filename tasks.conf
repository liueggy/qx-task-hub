# Quantumult X task repository
# Raw URL example:
# https://raw.githubusercontent.com/liueggy/qx-task-hub/main/tasks.conf

# 注意：发布到 GitHub 后，请把下面的 REPO_BASE 换成实际 Raw 地址。
# Quantumult X 不支持变量，这里仅作为注释说明。

# 当前出口 IP 查询
event-interaction, tag=当前出口 IP 查询, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png, script-url=https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/ip-info.js, timeout=30, enabled=true

# DNS 泄漏检测
event-interaction, tag=DNS 泄漏检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DNS.png, script-url=https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/dns-leak.js, timeout=30, enabled=true

# HTTPBin 请求检测
event-interaction, tag=HTTPBin 请求检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png, script-url=https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/httpbin-check.js, timeout=30, enabled=true

# GitHub Raw 连通性
event-interaction, tag=GitHub Raw 连通性, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png, script-url=https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/github-raw-check.js, timeout=30, enabled=true

# 节点延迟粗测
event-interaction, tag=节点延迟粗测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png, script-url=https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/latency-check.js, timeout=60, enabled=true
