# Quantumult X task repository
# Import URL:
# https://raw.githubusercontent.com/liueggy/qx-task-hub/main/tasks.conf

# 当前出口 IP 查询
event-interaction https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/ip-info.js, tag=当前出口 IP 查询, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png, enabled=true

# DNS 泄漏检测
event-interaction https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/dns-leak.js, tag=DNS 泄漏检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DNS.png, enabled=true

# HTTPBin 请求检测
event-interaction https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/httpbin-check.js, tag=HTTPBin 请求检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png, enabled=true

# GitHub Raw 连通性
event-interaction https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/github-raw-check.js, tag=GitHub Raw 连通性, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png, enabled=true

# 节点延迟粗测
event-interaction https://raw.githubusercontent.com/liueggy/qx-task-hub/main/scripts/latency-check.js, tag=节点延迟粗测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png, enabled=true
